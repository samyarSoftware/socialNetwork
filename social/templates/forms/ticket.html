{% extends 'parent/base.html' %}
{% block title%} ticket {%endblock%}
{% block content %}
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li {% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}
    <!-- {{request.user.first_name }} تیکت شما با موفقیت ارسال شد

        <h1>تیکت خود را وارد کنید</h1> -->

    <form method="post">
        {% csrf_token %}
        {{form.as_p}}
        <input type="submit" value="ارسال">
    </form>
{% endblock %}
